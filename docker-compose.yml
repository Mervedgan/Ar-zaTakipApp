version: "3.9"

services:
  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mobileapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: MobileAppDb
      POSTGRES_USER: mobileapp_user
      POSTGRES_PASSWORD: mobileapp_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run initial schema + seeds on first boot
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./database/seeds:/docker-entrypoint-initdb.d/seeds:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobileapp_user -d MobileAppDb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PgAdmin (optional UI) ──────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mobileapp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mobileapp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
